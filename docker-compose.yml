services:
  db:
    image: mariadb:latest
    container_name: mariadb_homelab
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_segura
      MYSQL_DATABASE: homelab_db
    volumes:
      - ./data/db:/var/lib/mysql

  adminer:
    image: adminer
    container_name: adminer_gui
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  web-core:
    image: nginx:alpine
    container_name: web-core
    restart: always
    volumes:
      - ./web:/usr/share/nginx/html:ro

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: always
    environment:
      - DOZZLE_BASE=/dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  gateway:
    image: nginx:alpine
    container_name: gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - web-core
      - dozzle
