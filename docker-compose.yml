services:
  db:
    image: mariadb:latest
    container_name: mariadb_homelab
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_segura # Cámbiala luego
      MYSQL_DATABASE: homelab_db
    volumes:
      - ./data/db:/var/lib/mysql

  adminer:
    image: adminer
    container_name: adminer_gui
    restart: always
    ports:
      - 8080:8080
services:
  web-core:
    image: nginx:alpine
    container_name: web-core
    volumes:
      - ./web:/usr/share/nginx/html
    restart: always

  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-core
    restart: always

  dozzle:
    image: amir20/dozzle:latest
    container_name: logs-viewer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    restart: always
